# Mosquitto config for Fly.io deployment.
# Auth: Mosquitto 2.0 Dynamic Security plugin (replaces static passwd file).
# Users/roles/ACLs live in /mosquitto/data/dynamic-security.json on the persistent volume.
# Modify at runtime by publishing JSON control messages on $CONTROL/dynamic-security/v1.

# Listen on all interfaces (IPv4 for public, IPv6 for Fly's 6PN private network).
listener 1883
protocol mqtt

# --- Auth ---
allow_anonymous false
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/data/dynamic-security.json

# --- Persistence (broker session state, not auth — auth is handled by plugin) ---
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# --- Logging ---
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# --- Limits ---
max_keepalive 120
max_packet_size 65536
