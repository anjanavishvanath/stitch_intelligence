# Fly.io config for Stitch Intelligence MQTT broker.
# Run `fly deploy` from this directory.

app = "stitch-mqtt"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

# Persistent volume for retained messages and session state.
[[mounts]]
  source      = "mosquitto_data"
  destination = "/mosquitto/data"

# Raw TCP service — no HTTP/TLS handler, MQTT speaks its own protocol.
[[services]]
  protocol      = "tcp"
  internal_port = 1883
  auto_stop_machines  = false   # Broker must stay up; subscribers shouldn't get killed.
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port     = 1883
    handlers = []   # passthrough; do NOT add "http" or "tls" here.

  [services.concurrency]
    type        = "connections"
    soft_limit  = 200
    hard_limit  = 250

[[vm]]
  size      = "shared-cpu-1x"
  memory    = "256mb"
  cpu_kind  = "shared"
  cpus      = 1
