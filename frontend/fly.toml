# Fly.io config for Stitch Intelligence frontend (Nginx-served React SPA).
# Run `fly deploy --build-arg VITE_API_BASE_URL=<backend-url>` from this directory.

app = "stitch-frontend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port        = 80
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

[[vm]]
  size     = "shared-cpu-1x"
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
